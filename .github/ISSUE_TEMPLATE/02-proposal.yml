name: Proposal
description: Suggest a focused workflow improvement.
title: "[Proposal]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What change do you suggest?
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Trade-offs
      description: What does this add, remove, or make harder?
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This proposal keeps the workflow lightweight.
          required: true
        - label: This proposal is suitable for an open source project.
          required: true
